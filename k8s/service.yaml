apiVersion: v1
kind: Service
metadata:
  name: gin-server-service
spec:
  selector:
    app: gin-server
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000
  type: LoadBalancer
---
apiVersion: v1
kind: Service
metadata:
  name: gin-server-headless
spec:
  clusterIP: None
  selector:
    app: gin-server
  ports:
    - protocol: TCP
      port: 4000
      targetPort: 4000

